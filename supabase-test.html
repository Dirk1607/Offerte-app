<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase-verbindingstest — TNL</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; color: #1a1a2e; }
  h1 { color: #1B3A6B; }
  .status { padding: 12px 16px; border-radius: 8px; font-weight: 600; margin: 16px 0; }
  .ok   { background: #e8f7ef; color: #2E7D52; }
  .fout { background: #fdecea; color: #C0392B; }
  .lijn-titel { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #6b7a99; margin: 22px 0 8px; }
  .lijn { padding: 6px 0; border-bottom: 1px solid #eef2f9; }
  .lijn b { color: #1B3A6B; }
  .station { margin-left: 20px; padding: 8px 0; }
  .artikel { margin-left: 40px; padding: 6px 12px; background: #F4F7FB; border-radius: 6px; margin-top: 6px; }
  .prijs { color: #E8812A; font-weight: 700; }
  small { color: #6b7a99; }
</style>
</head>
<body>
  <h1>🔌 Supabase-verbindingstest</h1>
  <p>Deze pagina leest live uit je Supabase-database via <code>db.js</code>.</p>
  <div id="status" class="status">Verbinden…</div>
  <div id="inhoud"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase/config.js"></script>
  <script src="supabase/db.js"></script>
  <script>
  (async () => {
    const status = document.getElementById('status');
    const inhoud = document.getElementById('inhoud');
    try {
      const [lijnen, stations, catalogus, tarieven] = await Promise.all([
        TNL.getLijnen(), TNL.getStations(), TNL.getCatalogus(), TNL.getTarieven()
      ]);

      status.className = 'status ok';
      status.textContent = `✓ Verbonden — ${lijnen.length} lijnen, ${stations.length} stations, ${catalogus.length} artikel(en). Tarieven: Jr €${tarieven.Jr} / Sr €${tarieven.Sr}.`;

      // Groepeer stations per lijn en artikelen per station
      const artPerStation = {};
      catalogus.forEach(a => (artPerStation[a.station_id] ??= []).push(a));
      const statPerLijn = {};
      stations.forEach(s => (statPerLijn[s.lijn_code] ??= []).push(s));

      let html = '';
      for (const type of ['metrolijn', 'versneller']) {
        html += `<div class="lijn-titel">${type === 'metrolijn' ? '🚇 Metrolijnen' : '⚡ Versnellers'}</div>`;
        lijnen.filter(l => l.type === type).forEach(l => {
          const stats = statPerLijn[l.code] || [];
          html += `<div class="lijn">${l.icon || ''} <b>${l.naam}</b> <small>(${l.code})</small>`;
          stats.forEach(s => {
            html += `<div class="station">📍 ${s.naam}`;
            (artPerStation[s.id] || []).forEach(a => {
              const m = TNL.berekenNiveau(a.niveaus?.M, tarieven);
              html += `<div class="artikel">${a.subnaam || '(naamloos)'} — niveau M: <span class="prijs">€${m.prijs.toLocaleString('nl-BE')}</span> · ${m.dagen} dagen</div>`;
            });
            html += `</div>`;
          });
          html += `</div>`;
        });
      }
      inhoud.innerHTML = html;
    } catch (e) {
      status.className = 'status fout';
      status.textContent = '✗ Fout: ' + (e.message || e);
      console.error(e);
    }
  })();
  </script>
</body>
</html>
